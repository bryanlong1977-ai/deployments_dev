# GitHub Actions Full Landing Zone DESTROY Workflow
# ⚠️ WARNING: This workflow DESTROYS all infrastructure in REVERSE deployment order
# Generated by CloudCraft AI
#
# Original Deployment Order:
#   1. Network Deployment 1 (connectivity)
#   2. Network Deployment 1 (identity)
#   3. Network Deployment 1 (management)
#   4. Tools Deployment 1 (management)
#   5. Tools Deployment 2 (management)
#   6. Tools Deployment 1 (identity)
#   7. Tools Deployment 1 (connectivity)
#   8. Network Deployment 2 (connectivity)
#   9. Network Deployment 2 (identity)
#   10. Network Deployment 2 (management)
#   11. NSG Deployment 1 (connectivity)
#   12. NSG Deployment 1 (identity)
#   13. NSG Deployment 1 (management)
#   14. Route Table Deployment 1 (connectivity)
#   15. Route Table Deployment 1 (identity)
#   16. Route Table Deployment 1 (management)
#
# Destroy Order (REVERSED):
#   1. Route Table Deployment 1 (management)
#   2. Route Table Deployment 1 (identity)
#   3. Route Table Deployment 1 (connectivity)
#   4. NSG Deployment 1 (management)
#   5. NSG Deployment 1 (identity)
#   6. NSG Deployment 1 (connectivity)
#   7. Network Deployment 2 (management)
#   8. Network Deployment 2 (identity)
#   9. Network Deployment 2 (connectivity)
#   10. Tools Deployment 1 (connectivity)
#   11. Tools Deployment 1 (identity)
#   12. Tools Deployment 2 (management)
#   13. Tools Deployment 1 (management)
#   14. Network Deployment 1 (management)
#   15. Network Deployment 1 (identity)
#   16. Network Deployment 1 (connectivity)
#
# This workflow includes a confirmation gate — you must type "DESTROY" to proceed.

name: Full Landing Zone Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        type: choice
        options:
          - production
          - staging
          - development
        default: 'production'
      confirm_destroy:
        description: 'Type DESTROY to confirm'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.10.0'

jobs:
  validate-destroy:
    name: '⚠️ Validate Destroy Confirmation'
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "::error::You must type DESTROY in the confirm_destroy input to proceed."
            echo "::error::This is a safety check to prevent accidental destruction."
            exit 1
          fi
          echo "Destroy confirmation validated. Proceeding with full destroy..."
  destroy_1_management_route_table_deployment_1_plan:
    name: 'Destroy 1/16 Plan: Route Table Deployment 1 (management)'
    runs-on: ubuntu-latest
    needs: validate-destroy
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Terraform Init
        working-directory: landingzone/hub-spoke-primary/management/route-table-deployment-1
        run: terraform init -input=false
        env:
          ARM_USE_OIDC: true
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      
      - name: Terraform Plan Destroy
        working-directory: landingzone/hub-spoke-primary/management/route-table-deployment-1
        run: terraform plan -destroy -compact-warnings -var-file=../../config/terraform.tfvars -input=false -out=tfplan-destroy
        env:
          ARM_USE_OIDC: true
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      
      - name: Upload Destroy Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-destroy-step-1-route-table-deployment-1
          path: landingzone/hub-spoke-primary/management/route-table-deployment-1/tfplan-destroy
          retention-days: 1

  destroy_1_management_route_table_deployment_1_destroy:
    name: 'Destroy 1/16 Apply: Route Table Deployment 1 (management)'
    runs-on: ubuntu-latest
    needs: destroy_1_management_route_table_deployment_1_plan
